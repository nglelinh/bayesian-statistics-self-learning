# Setup
title:               "Your Course Title"
description:         'Your Course Description'
url:                 https://nglelinh.github.io
baseurl:             '/bayesian-statistics-self-learning'
imgurl:              https://nglelinh.github.io/bayesian-statistics-self-learning/img
paginate:            5
permalink:           pretty

# Multi-language support
languages:           ["en", "vi"]
default_lang:        "en"
exclude_from_localization: ["javascript", "images", "css", "public"]
parallel_localization: true

# Language-specific configurations
t:
  en:
    title: "Your Course Title"
    description: "Your Course Description"
    home: "Home"
    chapters: "Chapters"
    language: "Language"
    switch_language: "Switch to Vietnamese"
    required: "Required"
    optional: "Optional"
  vi:
    title: "Tiêu đề Khóa học của bạn"
    description: "Mô tả khóa học của bạn"
    home: "Trang chủ"
    chapters: "Các chương"
    language: "Ngôn ngữ"
    switch_language: "Chuyển sang tiếng Anh"
    required: "Bắt buộc"
    optional: "Tùy chọn"
# About/contact
author:
  name:              Your Name
  email:             your.email@example.com

# Gems
plugins:
  - jekyll-paginate
  - jekyll-feed

plugins_dir: _plugins

# Collections for multilingual content
collections:
  posts:
    output: true
    permalink: /:categories/:title/

# Custom vars
version:             0.0.1
markdown: kramdown

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

# Analytics
google_analytics_id: ""
