# Setup
title:               "Your Course Title"
description:         'Your Course Description'
url:                 https://nglelinh.github.io
baseurl:             '/bayesian-statistics-self-learning'
imgurl:              https://nglelinh.github.io/bayesian-statistics-self-learning/img
paginate:            5
permalink:           pretty

# Multi-language support
languages:           ["en", "vi"]
default_lang:        "en"
exclude_from_localization: ["javascript", "images", "css", "public"]
parallel_localization: true

# Language-specific configurations
t:
  en:
    title: "Bayesian Statistics Self-Learning"
    description: "Bayesian Statistics Self-Learning"
    home: "Home"
    chapters: "Chapters"
    language: "Language"
    switch_language: "Switch to Vietnamese"
    required: "Required"
    optional: "Optional"
    access_gate_title: "Private Course Site"
    access_gate_description: "Enter the shared password to continue."
    access_gate_password_label: "Password"
    access_gate_submit: "Unlock"
    access_gate_error: "Incorrect password. Please try again."
    access_gate_js_required: "JavaScript must be enabled to use this login gate."
  vi:
    title: "Bayesian Statistics Self-Learning"
    description: "Bayesian Statistics Self-Learning"
    home: "Trang chủ"
    chapters: "Các chương"
    language: "Ngôn ngữ"
    switch_language: "Chuyển sang tiếng Anh"
    required: "Bắt buộc"
    optional: "Tùy chọn"
    access_gate_title: "Trang Học Riêng Tư"
    access_gate_description: "Nhập mật khẩu dùng chung để tiếp tục."
    access_gate_password_label: "Mật khẩu"
    access_gate_submit: "Mở khóa"
    access_gate_error: "Mật khẩu chưa đúng. Vui lòng thử lại."
    access_gate_js_required: "Cần bật JavaScript để sử dụng lớp đăng nhập này."
# About/contact
author:
  name:              Your Name
  email:             your.email@example.com

# Gems
plugins:
  - jekyll-paginate
  - jekyll-feed

plugins_dir: _plugins

# Collections for multilingual content
collections:
  posts:
    output: true
    permalink: /:categories/:title/

# Custom vars
version:             0.0.1
markdown: kramdown

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

# Analytics
google_analytics_id: ""

# Lightweight site-wide password gate for static GitHub Pages hosting.
# This is not server-side HTTP Basic Auth.
access_gate:
  enabled: true
  password: "iuh"
  session_key: "bayesian-statistics-self-learning-access"
